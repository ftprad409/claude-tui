<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1000px;
    height: 420px;
    overflow: hidden;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    background: #0a0e14;
    display: flex;
    position: relative;
  }

  body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0, 255, 65, 0.015) 2px, rgba(0, 255, 65, 0.015) 4px
    );
  }

  .left {
    width: 360px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    /* increased left padding slightly for better visual balance */
    padding: 40px 20px 40px 52px;
  }

  .badge {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #00ff41;
    border: 1px solid #03a062;
    padding: 2px 10px;
    border-radius: 3px;
    margin-bottom: 14px;
    display: inline-block;
    align-self: flex-start;
  }

  .title {
    font-size: 52px;
    font-weight: 700;
    color: #e8edf3;
    letter-spacing: -2px;
    margin-bottom: 10px;
  }
  .title span { color: #00ff41; }

  .tagline {
    font-size: 14px;
    color: #6b7a8d;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .features {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .feat {
    font-size: 10px;
    color: #03a062;
    border: 1px solid #1e2a3a;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(0, 255, 65, 0.03);
  }

  /* ── Claude Code simulation ── */
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  .cc-window {
    flex: 1;
    background: #1a1b26;
    border-left: 1px solid #1e2a3a;
    display: flex;
    flex-direction: column;
  }

  .cc-header {
    background: #16171f;
    padding: 8px 16px;
    border-bottom: 1px solid #1e2a3a;
    font-size: 11px;
    color: #6b7a8d;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cc-header .dots {
    display: flex;
    gap: 5px;
  }
  .cc-header .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .dot-r { background: #f04040; }
  .dot-y { background: #f0c040; }
  .dot-g { background: #00c040; }

  .cc-body {
    flex: 1;
    padding: 16px 20px;
    font-size: 12px;
    line-height: 1.7;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .cc-msg {
    margin-bottom: 12px;
  }

  .cc-role {
    font-size: 10px;
    margin-bottom: 3px;
  }

  .cc-user .cc-role { color: #56d4dd; }
  .cc-assistant .cc-role { color: #c678dd; }

  .cc-text {
    color: #c5cdd8;
    font-size: 12px;
    line-height: 1.6;
  }

  .cc-tool {
    background: rgba(0, 255, 65, 0.04);
    border-left: 2px solid #03a062;
    padding: 4px 10px;
    margin: 4px 0;
    font-size: 11px;
    color: #6b7a8d;
  }
